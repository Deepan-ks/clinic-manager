spring.application.name=billing
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/clinicbilling}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelogs/db.changelog-master.xml
spring.jpa.show-sql=true
logging.level.org.springdoc=DEBUG
logging.level.org.springframework.web=DEBUG

# Swagger UI & API Docs Custom Paths
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/api-docs
